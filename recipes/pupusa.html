    <h1>Pupusa</h1>
    <img src="../images/Pupusa.bmp" alt="Pupusa">
    <p>An El Salvadoran treat, these homemade tortillas stuffed with cheese are great with a traditional coleslaw called curtido.</p>
    <p>To serve, slice open one side of a pupusa, and spoon curtido into the opening.</p>
    <p>Farmer's cheese or mozzarella can be substituted for queso blanco.</p>
